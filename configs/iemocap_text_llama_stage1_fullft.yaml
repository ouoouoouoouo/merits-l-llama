# IEMOCAP Text Stage I — Llama-3.1-8B full fine-tune, resumed from
# MSP-PODCAST full-FT pretrain.
#
# Requires Blackwell 6000 (102 GB VRAM).
# Baseline (LoRA + pretrain):  test wF1 = 0.7038
# Expected (full FT + pretrain): test wF1 = 0.72~0.75

run_name: iemocap_text_llama_stage1_fullft
seed: 42
output_dir: outputs/iemocap_text_llama_stage1_fullft

dataset:
  manifest_dir: data/manifests/iemocap
  num_labels: 4
  label_names: [angry, happy, sad, neutral]

model:
  model_id: meta-llama/Meta-Llama-3.1-8B
  num_labels: 4
  use_lora: false           # ★ FULL FINE-TUNE
  pool: mean
  head_dropout: 0.1
  # Resume from full-FT pretrain (loads whole base + head-mismatch handling)
  resume_from: outputs/msppodcast_llama_pretrain_fullft/best

train:
  epochs: 8
  batch_size: 2
  eval_batch_size: 4
  grad_accum: 8
  max_length: 128
  # Very small LR when full-FT-ing a model that's already pretrained.
  learning_rate: 2.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_clip: 1.0
  early_stopping_patience: 3
  save_best_metric: weighted_f1
  save_best_split: val
  num_workers: 2
  optimizer: adamw8bit

logging:
  use_wandb: true
  wandb_project: merits-l-llama
  log_every: 20
