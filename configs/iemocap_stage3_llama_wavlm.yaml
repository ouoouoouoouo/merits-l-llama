# Stage III fusion — Llama (LoRA no pretrain) text + Vanilla WavLM audio.
#
# Ablation: replaces CARE audio branch with plain WavLM-base + SUPERB pool.
# Baseline reference (Llama + CARE, 5-seed):  0.8567 ± 0.0139 (best 0.8746)
#
# Prerequisite: iemocap_audio_wavlm_stage2_utt.pt generated from
# merits-l-text/outputs/audio_stage2_superb13/best/stage2.pt

run_name: iemocap_stage3_llama_wavlm
seed: 42
output_dir: outputs/iemocap_stage3_llama_wavlm

dataset:
  manifest_dir: data/manifests/iemocap
  text_features_path:  data/cache/iemocap_text_llama_stage2_utt.pt
  # ← Vanilla WavLM Audio Stage II hidden (from merits-l-text)
  audio_features_path: data/cache/iemocap_audio_wavlm_stage2_utt.pt
  num_labels: 4
  label_names: [angry, happy, sad, neutral]

model:
  text_dim: 2048           # Llama Stage II output
  audio_dim: 768           # Vanilla WavLM Stage II output (2 * gru_hidden=384)
  hidden_dim: 256
  num_heads: 8
  dropout: 0.5
  num_labels: 4

train:
  epochs: 100
  batch_size: 8
  eval_batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  optimizer: adamw
  scheduler: linear
  grad_clip: 1.0
  fp16: false
  early_stopping_patience: 20
  save_best_metric: weighted_f1
  save_best_split: val
  num_workers: 2

logging:
  use_wandb: true
  wandb_project: merits-l-llama
  log_every: 10
