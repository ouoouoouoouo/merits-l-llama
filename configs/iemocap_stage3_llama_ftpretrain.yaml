# Stage III fusion — Llama (FT-with-pretrain) text + WavLM CARE audio.
#
# Text  side: Llama-3.1-8B + LoRA (MSP-PODCAST pretrain -> IEMOCAP FT)
# Audio side: WavLM-base + CARE  (reused from merits-l-text)
#
# Baseline (Llama without pretrain):
#   fusion wF1 5-seed = 0.8567 ± 0.0139  best 0.8746

run_name: iemocap_stage3_llama_ftpretrain
seed: 42
output_dir: outputs/iemocap_stage3_llama_ftpretrain

dataset:
  manifest_dir: data/manifests/iemocap
  text_features_path:  data/cache/iemocap_text_llama_ftpretrain_stage2_utt.pt
  audio_features_path: data/cache/iemocap_audio_stage2_utt.pt
  num_labels: 4
  label_names: [angry, happy, sad, neutral]

model:
  text_dim: 2048
  audio_dim: 256
  hidden_dim: 256
  num_heads: 8
  dropout: 0.5
  num_labels: 4

train:
  epochs: 100
  batch_size: 8
  eval_batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  optimizer: adamw
  scheduler: linear
  grad_clip: 1.0
  fp16: false
  early_stopping_patience: 20
  save_best_metric: weighted_f1
  save_best_split: val
  num_workers: 2

logging:
  use_wandb: true
  wandb_project: merits-l-llama
  log_every: 10
