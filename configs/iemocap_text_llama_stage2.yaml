# Text Stage II — Bi-GRU + self-attention on Llama features.
#
# Input: 4096-d Llama last-hidden-state mean-pool (from Stage I best model).
# Baseline reference (RoBERTa-based Stage II, from merits-l-text):
#   test wF1 = 0.8202 ± 0.0037 (n=5)
#
# Compared to the RoBERTa-based Stage II, we scale up gru_hidden proportionally
# to the 4x larger input dim (256 -> 512 for RoBERTa; 512 -> 1024 for Llama).

run_name: iemocap_text_llama_stage2
seed: 42
output_dir: outputs/iemocap_text_llama_stage2

dataset:
  manifest_dir: data/manifests/iemocap
  # Produced by scripts/extract_text_features_llama.py after Stage I finishes.
  features_path: data/cache/iemocap_llama_features.pt
  num_labels: 4
  label_names: [angry, happy, sad, neutral]

model:
  input_dim: 4096          # Llama-3.1-8B hidden size
  gru_hidden: 1024         # Bi-GRU output = 2 * 1024 = 2048
  gru_layers: 2
  num_heads: 8             # 2048 / 8 = 256 per head
  dropout: 0.5
  num_labels: 4

train:
  epochs: 100
  batch_size: 8
  eval_batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  optimizer: adamw
  scheduler: linear
  grad_clip: 1.0
  fp16: false
  early_stopping_patience: 20
  save_best_metric: weighted_f1
  save_best_split: val
  num_workers: 2

logging:
  use_wandb: true
  wandb_project: merits-l-llama
  log_every: 10
